:root{

  --navy:#0D1B2A;--mid:#1A2E45;--light:#253A52;

body{background:var(--navy);font-family:'Heebo','Segoe UI',Arial,sans-serif;color:var(--white);min-height:100vh;direction:rtl}
input,select,textarea,button{font-family:inherit;font-size:14px}
button{cursor:pointer;border:none;border-radius:8px;font-weight:700;transition:opacity .15s}
button:active{opacity:.8}
.page{display:none;padding:18px 14px calc(60px + env(safe-area-inset-bottom));max-width:900px;margin:0 auto}
.page.active{display:block}

.nav-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;height:52px;gap:8px;padding-top:0}
.nav-logo{background:var(--red);border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;flex-shrink:0}
.nav-title{font-weight:900;font-size:14px;white-space:nowrap;flex-shrink:0}
.nav-tabs{display:flex;gap:2px;flex:1;justify-content:center}
.nav-tab{background:transparent;color:var(--gray);padding:6px 12px;border-radius:8px;font-size:12px;white-space:nowrap;position:relative}
.nav-tab.active{background:var(--red);color:var(--white)}

#user-sel{background:var(--light);border:none;border-radius:8px;padding:5px 8px;color:var(--gray);font-size:11px;direction:rtl;max-width:110px;flex-shrink:0}

.card-sm{background:var(--navy);border-radius:8px;padding:10px 14px;border:1px solid var(--light);margin-bottom:6px}
/* BUTTONS */
.btn{padding:9px 18px;border-radius:8px;font-size:13px;min-height:38px}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--gray);border:1px solid var(--light)}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-blue{background:transparent;color:var(--blue);border:1px solid var(--blue)}
.btn-green{background:transparent;color:var(--green);border:1px solid var(--green)}
.btn-danger{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.btn-sm{padding:5px 12px;font-size:12px;min-height:30px}
.btn-wa{background:#25D366;color:#fff;border:none}
/* BADGES */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
/* FORM */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--gray);margin-bottom:5px;font-weight:700}

.field textarea{min-height:80px;resize:vertical}
.row2{display:flex;gap:10px}.row2>.field{flex:1}

.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-header h3{font-size:17px;color:var(--white)}
.modal-close{background:none;border:none;color:var(--gray);font-size:26px;line-height:1;padding:0 4px}
/* PROGRESS */
.pbar{background:var(--navy);border-radius:6px;overflow:hidden}
.pbar-fill{height:100%;border-radius:6px;transition:width .4s}

.gantt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.gantt-row{display:flex;align-items:center;margin-top:3px}
.gantt-label{width:160px;flex-shrink:0;padding:4px 8px;font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gantt-track{flex:1;height:24px;position:relative;background:var(--navy);border-radius:4px}

.gantt-today{position:absolute;top:0;bottom:0;width:2px;background:var(--red);z-index:3}

// ── Save: Firebase first, localStorage as backup ──
function saveState(){
  // Always save locally as backup
  try{ localStorage.setItem(SK, JSON.stringify(state.projects)); }catch{}
  // Debounce Firebase saves (300ms)
  if(saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(()=>saveToFirebase(), 300);
  // Show sync indicator
  showSyncStatus("saving");
}

async function saveToFirebase(){
  if(!db) return;
  try{
    const {doc, setDoc} = window.firestore;
    await setDoc(doc(db,"strauss_pm","projects"),{data: JSON.stringify(state.projects), updated: Date.now()});
    showSyncStatus("saved");
  }catch(e){
    console.warn("Firebase save failed:", e);
    showSyncStatus("offline");
  }
}

async function loadState(){
  // First load from localStorage for instant display
  try{
    const d=localStorage.getItem(SK);
    if(d){ state.projects=JSON.parse(d); }
    else{ state.projects=JSON.parse(JSON.stringify(SEED)); }
  }catch{ state.projects=JSON.parse(JSON.stringify(SEED)); }

  // Then try Firebase for latest data
  if(db){
    try{
      showSyncStatus("loading");
      const {doc, getDoc} = window.firestore;
      const snap = await getDoc(doc(db,"strauss_pm","projects"));
      if(snap.exists()){
        const cloudData = JSON.parse(snap.data().data);
        // Use cloud data if it's newer (has more projects or different data)
        state.projects = cloudData;
        localStorage.setItem(SK, JSON.stringify(state.projects));
        showSyncStatus("synced");
      } else {
        // First time - save seed to Firebase
        await saveToFirebase();
        showSyncStatus("synced");
      }
      // Re-render with cloud data
      updateUserSelector();
      renderPage(currentPage);
      updateOverdueBadge();
      syncBottomNavBadge();
    }catch(e){
      console.warn("Firebase load failed, using local data:", e);
      showSyncStatus("offline");
    }
  }
}

function showSyncStatus(status){
  const el = document.querySelector(".save-indicator");

  const map = {
    saving:  "☁️ שומר...",
    saved:   "✅ מסונכרן",
    synced:  "✅ מסונכרן",

/* ═══════════════════════════ EXPORT ═══════════════════════════ */
function dlBlob(content,filename,mime){
  const b=new Blob(["\uFEFF"+content],{type:mime});
  const u=URL.createObjectURL(b);
  const a=document.createElement("a");
  a.href=u;a.download=filename;a.click();
  URL.revokeObjectURL(u);
}
function exportCSV(pid){
  const p=state.projects.find(x=>x.id===pid);
  const e=v=>`"${String(v||"").replace(/"/g,'""')}"`;
  const rows=[];
  rows.push("=== תיק פרויקט ===");
  rows.push([e("שם"),e(p.name)].join(","));
  rows.push([e("מנהל"),e(p.owner)].join(","));
  rows.push([e("תקציב"),e(p.budget)].join(","));
  rows.push([e("הוצאות"),e(p.spent)].join(","));
  rows.push("");
  rows.push("=== משימות ===");
  rows.push([e("תוכנית"),e("משימה"),e("אחראי"),e("התחלה"),e("סיום"),e("סטטוס"),e("התקדמות")].join(","));
  p.workplans.forEach(wp=>wp.tasks.forEach(t=>rows.push([e(wp.name),e(t.name),e(gname(p,t.assigneeId)),e(t.start),e(t.end),e(t.status),e(t.progress+"%")].join(","))));
  rows.push(""); rows.push("=== אבני דרך ===");
  p.milestones.forEach(m=>rows.push([e(m.name),e(m.date),e(m.status)].join(",")));
  rows.push(""); rows.push("=== צוות ===");
  p.team.forEach(m=>rows.push([e(m.name),e(m.role),e(m.email),e(m.phone)].join(",")));
  dlBlob(rows.join("\r\n"),p.name.replace(/\s+/g,"-")+".csv","text/csv;charset=utf-8");
}
function exportXML(pid){
  const p=state.projects.find(x=>x.id===pid);
  const e=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const aT=p.workplans.flatMap(wp=>wp.tasks.map(t=>({...t,wpName:wp.name})));
  const xml=`<?xml version="1.0" encoding="UTF-8"?>\n<Project xmlns="http://schemas.microsoft.com/project">\n  <n>${e(p.name)}</n>\n  <StartDate>${p.startDate}T08:00:00</StartDate>\n  <FinishDate>${p.endDate}T17:00:00</FinishDate>\n  <Tasks>\n    <Task><UID>1</UID><ID>0</ID><n>${e(p.name)}</n></Task>\n    ${aT.map((t,i)=>`<Task><UID>${i+2}</UID><ID>${i+2}</ID><n>${e(t.name)}</n><Start>${t.start}T08:00:00</Start><Finish>${t.end}T17:00:00</Finish><PercentComplete>${t.progress}</PercentComplete></Task>`).join("\n    ")}\n  </Tasks>\n</Project>`;
  dlBlob(xml,p.name.replace(/\s+/g,"-")+"-gantt.xml","application/xml");
}

  const allT=ps.flatMap(p=>allTasks(p));
  const pct=allT.length?Math.round(allT.filter(t=>t.status==="done").length/allT.length*100):0;
  const ovT=allT.filter(t=>isOverdue(t.end,t.status)).length;
  const ovMs=ps.flatMap(p=>p.milestones).filter(m=>m.status!=="done"&&diffDays(today(),m.date)<0).length;
  let html=`<h2 class="f18 fw9 mb12">📊 דשבורד</h2>

  </div>`;
  ps.forEach(p=>{

    const ot=allTasks(p).filter(t=>isOverdue(t.end,t.status)).length;
    const nextMs=[...p.milestones].filter(m=>m.status!=="done").sort((a,b)=>a.date.localeCompare(b.date))[0];

/* ─── GANTT ─── */
function renderGantt(p){
  if(!allTasks(p).length) return `<div class="c-gray" style="text-align:center;padding:40px">הוסף משימות בטאב "תוכניות עבודה"</div>`;
  const totalDays=Math.max(1,diffDays(p.startDate,p.endDate)+1);
  const todayOff=diffDays(p.startDate,today());
  const months=[];
  let cur=new Date(p.startDate); cur.setDate(1);
  while(cur<=new Date(p.endDate)){
    months.push({label:cur.toLocaleDateString("he-IL",{month:"short",year:"2-digit"}),days:new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate()});
    cur.setMonth(cur.getMonth()+1);
  }
  let h=`<h3 class="fw9 mb12">📊 גאנט</h3><div class="gantt-wrap"><div style="min-width:600px">`;
  h+=`<div class="flex" style="margin-right:160px">${months.map((m,i)=>`<div style="flex:0 0 ${m.days/totalDays*100}%;background:${i%2===0?"var(--mid)":"var(--light)"};padding:4px 3px;font-size:10px;color:var(--gray-l);font-weight:700;text-align:center;border-left:1px solid var(--navy)">${m.label}</div>`).join("")}</div>`;
  p.workplans.forEach(wp=>{
    h+=`<div class="gantt-row" style="margin-top:10px"><div class="gantt-label fw7" style="color:${esc(wp.color)}">■ ${esc(wp.name)}</div><div style="flex:1;height:3px;background:${esc(wp.color)};opacity:.25;border-radius:2px"></div></div>`;
    wp.tasks.forEach(t=>{
      const ts=Math.max(0,diffDays(p.startDate,t.start));
      const tl=Math.max(1,diffDays(t.start,t.end)+1);
      const ov=isOverdue(t.end,t.status);
      h+=`<div class="gantt-row"><div class="gantt-label f11" style="padding-right:20px;color:${ov?"var(--danger)":"var(--white)"}">${ov?"⚠ ":"↳ "}${esc(t.name)}</div>
        <div class="gantt-track">
          ${todayOff>=0&&todayOff<=totalDays?`<div class="gantt-today" style="left:${todayOff/totalDays*100}%"></div>`:""}
          <div class="gantt-bar" style="left:${ts/totalDays*100}%;width:${tl/totalDays*100}%;background:${ov?"var(--danger)":esc(wp.color)};opacity:${t.status==="done"?.45:.9}" title="${esc(t.name)}: ${fmt(t.start)}–${fmt(t.end)}">
            <div class="gantt-progress" style="width:${t.progress}%"></div>
            <span style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:#fff">${t.progress}%</span>
          </div>
        </div></div>`;
    });
  });
  h+=`</div></div><div class="flex wrap gap12 mt12 f11">`;
  p.workplans.forEach(wp=>{ h+=`<span style="color:${esc(wp.color)}">■ ${esc(wp.name)}</span>`; });
  h+=`<span class="c-danger">⚠ איחור</span><span class="c-red">| היום</span></div>`;
  return h;
}

/* ─── MILESTONES ─── */
function renderMilestones(p){
  let h=`<div class="flex sb ac mb12"><span class="fw7">🏁 אבני דרך</span><button class="btn btn-sm btn-red" onclick="showAddMilestone('${p.id}')">+ אבן דרך</button></div>`;
  if(!p.milestones.length) return h+`<div class="c-gray" style="text-align:center;padding:30px">אין אבני דרך</div>`;
  h+=`<div class="timeline">`;
  [...p.milestones].sort((a,b)=>a.date.localeCompare(b.date)).forEach(m=>{
    const d=diffDays(today(),m.date); const ov=m.status!=="done"&&d<0;
    const dotColor=m.status==="done"?"var(--green)":ov?"var(--danger)":m.status==="active"?"var(--gold)":"var(--light)";
    const icon=m.status==="done"?"✅":ov?"⚠":"🔲";
    h+=`<div class="tl-item"><div class="tl-dot" style="background:${dotColor}"></div>
      <div class="card" style="flex:1;padding:12px 14px;${ov?"border-right:3px solid var(--danger)":""}">
        <div class="flex sb wrap gap6">
          <div>
            <div class="fw7 f13" style="color:${ov?"var(--danger)":"var(--white)"}">${icon} ${esc(m.name)}</div>
            <div class="f11 mt4" style="color:${ov?"var(--danger)":"var(--gray)"}">📅 ${fmt(m.date)} ${m.status!=="done"?`(${d<0?"איחור "+Math.abs(d)+"י":d===0?"היום":"עוד "+d+"י"})`:""}</div>
            ${m.description?`<div class="f11 c-gray mt4">${esc(m.description)}</div>`:""}
          </div>
          <div class="flex gap4">
            ${m.status!=="done"?`<button class="btn btn-sm btn-green" onclick="completeMilestone('${p.id}','${m.id}')">✓</button>`:""}
            <button class="btn btn-sm btn-danger" onclick="deleteMilestone('${p.id}','${m.id}')">🗑</button>
          </div>
        </div>
      </div></div>`;
  });
  return h+`</div>`;
}

/* ─── MEETINGS ─── */
function renderMeetings(p){
  let h=`<div class="flex sb ac mb12"><span class="fw7">💬 סיכומי פגישות</span><button class="btn btn-sm btn-red" onclick="showAddMeeting('${p.id}')">+ פגישה</button></div>`;

  [...p.meetings].sort((a,b)=>b.date.localeCompare(a.date)).forEach(m=>{
    h+=`<div class="card mb8">
      <div class="flex sb ac" onclick="toggleMeeting('meeting-${m.id}')" style="cursor:pointer">
        <div><div class="fw7 f14">📋 ${esc(m.title)}</div><div class="f11 c-gray mt4">📅 ${fmt(m.date)} · 👥 ${m.participants.map(esc).join(", ")}</div></div>
        <div class="flex ac gap8"><span class="c-gold f13" id="meeting-arrow-${m.id}">▼</span><button onclick="event.stopPropagation();deleteMeeting('${p.id}','${m.id}')" style="background:none;border:none;color:var(--danger);font-size:16px;cursor:pointer">🗑</button></div>
      </div>
      <div id="meeting-${m.id}" style="display:none" class="sep">
        <div class="f12 fw7 c-gray mb4">סיכום:</div>
        <div class="f13" style="line-height:1.7;margin-bottom:10px">${esc(m.summary)}</div>
        ${m.decisions.length?`<div class="f12 fw7 c-gray mb4">החלטות:</div>${m.decisions.map(d=>`<div class="f12 c-gold mb4">✔ ${esc(d)}</div>`).join("")}`:""}
        ${m.actions.length?`<div class="f12 fw7 c-gray mt8 mb4">פעולות נדרשות:</div>${m.actions.map(a=>`<div class="card-sm mb4 f12"><span>➤ ${esc(a.text)}</span> <span class="c-gray">| ${esc(a.owner)}</span>${a.due?` <span class="c-gold">| ${fmt(a.due)}</span>`:""}</div>`).join("")}`:""}
      </div>

function toggleMeeting(id){
  const el=document.getElementById(id);
  const arrow=document.getElementById("meeting-arrow-"+id.split("-")[1]);
  if(!el)return;
  const open=el.style.display==="none";
  el.style.display=open?"block":"none";
  if(arrow) arrow.textContent=open?"▲":"▼";
}

/* ─── RANGE LISTENERS ─── */
function attachRangeListeners(p){
  document.querySelectorAll(".task-range").forEach(inp=>{
    inp.addEventListener("input",function(){
      const {pid,wpid,tid}=this.dataset;
      const val=+this.value;
      const proj=state.projects.find(x=>x.id===pid);
      if(!proj)return;
      const wp=proj.workplans.find(w=>w.id===wpid);
      if(!wp)return;
      const task=wp.tasks.find(t=>t.id===tid);
      if(!task)return;
      task.progress=val;
      if(val===100) task.status="done";
      else if(task.status==="done") task.status="active";
      saveState();
      updateOverdueBadge();
    });
  });
}

function deleteProject(id){
  if(!confirm("למחוק פרויקט?"))return;
  state.projects=state.projects.filter(p=>p.id!==id);
  saveState(); renderProjectList(); updateUserSelector(); updateOverdueBadge();
}
function completeTask(pid,wpid,tid){
  const p=state.projects.find(x=>x.id===pid);
  const t=p?.workplans.find(w=>w.id===wpid)?.tasks.find(t=>t.id===tid);
  if(!t)return;
  t.status="done"; t.progress=100;
  saveState(); renderProject(pid,currentProjectTab); updateOverdueBadge();
}
function deleteTask(pid,wpid,tid){

  t.start=document.getElementById("et-start").value;
  t.end=document.getElementById("et-end").value;

function switchAIMode(mode){

let aiFileData=null;
let aiFileType=null;

function handleFileSelect(e,pid){
  const file=e.target.files[0];
  if(file) processAIFile(file,pid);
}
function handleFileDrop(e,pid){
  e.preventDefault();
  document.getElementById("ai-file-drop").classList.remove("drag");
  const file=e.dataTransfer.files[0];
  if(file) processAIFile(file,pid);
}
function processAIFile(file,pid){
  const info=document.getElementById("ai-file-info");
  const btn=document.getElementById("ai-doc-btn");
  info.style.display="block";
  info.textContent="⏳ טוען קובץ...";
  const reader=new FileReader();
  if(file.type==="application/pdf"||file.type.startsWith("image/")){
    reader.onload=function(e){
      const base64=e.target.result.split(",")[1];
      aiFileData=base64;
      aiFileType=file.type;
      info.textContent=`✓ ${file.name} (${(file.size/1024).toFixed(0)}KB)`;
      if(btn) btn.style.display="inline-block";
    };
    reader.readAsDataURL(file);
  } else {
    reader.onload=function(e){
      aiFileData=e.target.result;
      aiFileType="text";
      info.textContent=`✓ ${file.name} (${(file.size/1024).toFixed(0)}KB)`;
      if(btn) btn.style.display="inline-block";
    };
    reader.readAsText(file);
  }
}

async function runAI(pid,mode){
  const apiKey=getApiKey();
  if(!apiKey){alert("נא להזין Anthropic API Key בתחילת הדף");return;}
  const p=state.projects.find(x=>x.id===pid);
  if(!p)return;

  // Build project context
  const allT=allTasks(p);
  const ctx=`פרויקט: ${p.name}
מנהל: ${p.owner}
תאריכים: ${p.startDate} עד ${p.endDate}
סטטוס: ${p.status} | עדיפות: ${p.priority}
תקציב: ₪${p.budget.toLocaleString()} | הוצאות: ₪${p.spent.toLocaleString()}
צוות: ${p.team.map(m=>`${m.name} (${m.role})`).join(", ")||"אין"}
משימות קיימות: ${allT.map(t=>`${t.name} [${t.status}, ${t.progress}%]`).join(", ")||"אין"}
אבני דרך: ${p.milestones.map(m=>`${m.name} [${m.date}, ${m.status}]`).join(", ")||"אין"}`;

  let messages=[];
  let systemPrompt=`אתה עוזר ניהול פרויקטים מקצועי לחברת שטראוס. 
ענה תמיד בעברית.
הקשר הפרויקט: ${ctx}

חלץ מידע בפורמט JSON בלבד, ללא טקסט נוסף, בפורמט זה:
{
  "summary": "סיכום קצר בעברית",
  "tasks": [{"name":"שם משימה","assignee":"שם אחראי מהצוות או ריק","due":"YYYY-MM-DD או ריק","priority":"high/medium/low","notes":"הערה קצרה"}],
  "milestones": [{"name":"שם אבן דרך","date":"YYYY-MM-DD","description":"תיאור"}],
  "risks": ["סיכון 1","סיכון 2"],
  "decisions": ["החלטה 1","החלטה 2"],
  "meeting_title": "כותרת לסיכום פגישה אם רלוונטי"
}`;

  if(mode==="transcript"){
    const transcript=document.getElementById("ai-transcript").value.trim();
    if(!transcript){alert("נא להזין תמלול");return;}
    messages=[{role:"user",content:`נתח את תמלול הפגישה הבא וחלץ מידע רלוונטי:\n\n${transcript}`}];
  } else if(mode==="doc"){
    if(!aiFileData){alert("נא לבחור קובץ");return;}
    const instruction=document.getElementById("ai-doc-instruction").value.trim()||"נתח את המסמך וחלץ מידע רלוונטי לפרויקט";
    if(aiFileType==="text"){
      messages=[{role:"user",content:`${instruction}:\n\n${aiFileData}`}];
    } else {
      const mtype=aiFileType==="application/pdf"?"document":"image";
      messages=[{role:"user",content:[
        {type:mtype==="document"?"document":"image",
         source:{type:"base64",media_type:aiFileType,data:aiFileData}},
        {type:"text",text:instruction}
      ]}];
    }
  } else if(mode==="free"){
    const q=document.getElementById("ai-free-q").value.trim();
    if(!q){alert("נא להזין שאלה");return;}
    systemPrompt=`אתה עוזר ניהול פרויקטים לחברת שטראוס. ענה בעברית בצורה ברורה ומועילה.
הקשר הפרויקט: ${ctx}`;
    messages=[{role:"user",content:q}];
  }

  // Show loading
  document.getElementById("ai-loading").style.display="block";
  document.getElementById("ai-results").innerHTML="";

  try {
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:2000,system:systemPrompt,messages})
    });
    const data=await resp.json();
    if(data.error){throw new Error(data.error.message);}
    const text=data.content[0].text;
    document.getElementById("ai-loading").style.display="none";

    if(mode==="free"){
      document.getElementById("ai-results").innerHTML=`
        <div class="ai-result">
          <div class="f12 fw7 c-gold mb8">💬 תשובת ה-AI</div>
          <div class="f13" style="line-height:1.8;white-space:pre-wrap">${esc(text)}</div>
        </div>`;
      return;
    }

    // Parse JSON
    let result;
    try{ result=JSON.parse(text.replace(/```json|```/g,"").trim()); }
    catch{ result={summary:text,tasks:[],milestones:[],risks:[],decisions:[],meeting_title:""}; }

    renderAIResults(pid,result,mode);

  } catch(err){
    document.getElementById("ai-loading").style.display="none";
    document.getElementById("ai-results").innerHTML=`<div class="alert alert-danger">שגיאה: ${esc(err.message)}</div>`;
  }
}

function renderAIResults(pid,result,mode){
  const p=state.projects.find(x=>x.id===pid);
  let h=`<div class="ai-result">`;

  // Summary
  if(result.summary){
    h+=`<div class="mb12">
      <div class="f12 fw7 c-gold mb6">📝 סיכום</div>
      <div class="f13" style="line-height:1.7">${esc(result.summary)}</div>
    </div>`;
  }

  // Risks
  if(result.risks?.length){
    h+=`<div class="mb12">
      <div class="f12 fw7 c-gold mb6">⚠️ סיכונים שזוהו</div>
      ${result.risks.map(r=>`<div class="f12 c-warn mb4">• ${esc(r)}</div>`).join("")}
    </div>`;
  }

  // Decisions
  if(result.decisions?.length){
    h+=`<div class="mb12">
      <div class="f12 fw7 c-gold mb6">✅ החלטות</div>
      ${result.decisions.map(d=>`<div class="f12 c-gray mb4">✔ ${esc(d)}</div>`).join("")}
    </div>`;
  }

  // Tasks
  if(result.tasks?.length){
    h+=`<div class="mb12">
      <div class="f12 fw7 c-gold mb8">📋 משימות שזוהו (${result.tasks.length})</div>`;
    result.tasks.forEach((t,i)=>{
      const member=p.team.find(m=>m.name===t.assignee||m.name.includes(t.assignee)||t.assignee?.includes(m.name));
      h+=`<div class="ai-task-item">
        <div style="flex:1">
          <div class="fw7 f13 mb4">${esc(t.name)}</div>
          <div class="f11 c-gray">
            ${t.assignee?`👤 ${esc(t.assignee)} `:""}
            ${t.due?`📅 ${fmt(t.due)} `:""}
            ${t.priority?`<span class="ai-chip" style="background:${t.priority==="high"?"var(--red-dark)":t.priority==="medium"?"#2A2010":"var(--light)"};color:${t.priority==="high"?"var(--red-light)":"var(--gold)"}">${t.priority==="high"?"גבוהה":t.priority==="medium"?"בינונית":"נמוכה"}</span>`:""}
          </div>
          ${t.notes?`<div class="f11 c-gray mt4" style="font-style:italic">${esc(t.notes)}</div>`:""}
        </div>
        <button class="btn btn-sm btn-green" onclick="addAITask('${pid}',${i})">+ הוסף</button>
      </div>`;
    });
    h+=`<button class="btn btn-red mt8" onclick="addAllAITasks('${pid}')">✚ הוסף את כל המשימות</button>`;
    h+=`</div>`;
  }

  // Milestones
  if(result.milestones?.length){
    h+=`<div class="mb12">
      <div class="f12 fw7 c-gold mb8">🏁 אבני דרך שזוהו</div>
      ${result.milestones.map((m,i)=>`
        <div class="ai-task-item">
          <div style="flex:1"><div class="fw7 f13">${esc(m.name)}</div><div class="f11 c-gray">📅 ${fmt(m.date)}</div></div>
          <button class="btn btn-sm btn-green" onclick="addAIMilestone('${pid}',${i})">+ הוסף</button>
        </div>`).join("")}
    </div>`;
  }

  // Add as meeting summary
  if(mode==="transcript"&&result.summary){
    h+=`<div class="sep">
      <button class="btn btn-gold" onclick="addAIMeeting('${pid}')">💬 שמור כסיכום פגישה</button>
    </div>`;
  }

  h+=`</div>`;
  document.getElementById("ai-results").innerHTML=h;

  // Store result for later use
  window._aiLastResult={pid,result};
}

function addAITask(pid,idx){
  const p=state.projects.find(x=>x.id===pid);
  const result=window._aiLastResult?.result;
  if(!p||!result)return;
  const t=result.tasks[idx];

  // Find or create default workplan
  let wp=p.workplans[0];
  if(!wp){
    wp={id:uid(),name:"משימות AI",color:"#3498DB",tasks:[]};
    p.workplans.push(wp);
  }
  const member=p.team.find(m=>m.name===t.assignee||m.name.includes(t.assignee||"")||(t.assignee||"").includes(m.name));
  wp.tasks.push({id:uid(),name:t.name,assigneeId:member?.id||"",start:today(),end:t.due||"",priority:t.priority||"medium",notes:t.notes||"",deps:[],progress:0,status:"todo"});
  saveState();
  // Visual feedback
  const btns=document.querySelectorAll(".ai-task-item button");
  if(btns[idx]){btns[idx].textContent="✓ נוסף";btns[idx].style.background="var(--green)";btns[idx].style.color="#fff";}
}

function addAllAITasks(pid){
  const result=window._aiLastResult?.result;
  if(!result)return;
  result.tasks.forEach((_,i)=>addAITask(pid,i));
  const allBtns=document.querySelectorAll(".ai-task-item .btn-green");
  allBtns.forEach(b=>{b.textContent="✓ נוסף";b.style.background="var(--green)";b.style.color="#fff";});
  saveState();
  renderProject(pid,currentProjectTab);
}

function addAIMilestone(pid,idx){
  const p=state.projects.find(x=>x.id===pid);
  const result=window._aiLastResult?.result;
  if(!p||!result)return;
  const m=result.milestones[idx];
  p.milestones.push({id:uid(),name:m.name,date:m.date||today(),status:"todo",description:m.description||""});
  saveState();
  const btns=document.querySelectorAll(".ai-task-item:nth-child("+(idx+1)+") button");
  if(btns.length) btns[0].textContent="✓ נוסף";
}

function addAIMeeting(pid){
  const p=state.projects.find(x=>x.id===pid);
  const result=window._aiLastResult?.result;
  if(!p||!result)return;
  p.meetings.push({id:uid(),title:result.meeting_title||"סיכום פגישה (AI)",date:today(),participants:p.team.map(m=>m.name),summary:result.summary||"",decisions:result.decisions||[],actions:(result.tasks||[]).slice(0,3).map(t=>({text:t.name,owner:t.assignee||"",due:t.due||""}))});
  saveState();
  alert("✓ הסיכום נוסף לטאב הפגישות");
}

/* ═══════════════════════════ INIT ═══════════════════════════ */
async function initApp(){
  // Init Firebase
  try{
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js");
    const firestoreModule = await import("https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js");
    window.firestore = firestoreModule;
    const app = initializeApp(FB_CONFIG);
    db = firestoreModule.getFirestore(app);
    console.log("Firebase connected ✓");
  }catch(e){
    console.warn("Firebase init failed:", e);
    db = null;
  }
  // Load data (local first, then cloud)
  await loadState();
  updateUserSelector();
  renderDashboard();
  updateOverdueBadge();
  syncBottomNavBadge();
}
initApp();

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
}
</script>
